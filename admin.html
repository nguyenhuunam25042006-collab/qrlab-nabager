<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAB LAB PRO - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
    
    <style>
        :root {
            --admin-neon: #2ecc71;
            --bg-dark: #070a0f;
            --bg-card: #0c1017;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(46, 204, 113, 0.1);
        }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); 
            color: rgba(255,255,255,0.9); display: flex; min-height: 100vh; overflow-x: hidden; 
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px; background: var(--bg-card); border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column; transition: 0.3s ease;
            position: fixed; top: 0; left: 0; height: 100%; z-index: 1000;
        }
        .sidebar.collapsed { width: 70px; }

        .sidebar-header {
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--glass-border); height: 60px; box-sizing: border-box;
        }
        .logo-text { color: var(--admin-neon); font-size: 18px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .sidebar.collapsed .logo-text { opacity: 0; pointer-events: none; }

        .menu-toggle-btn {
            background: none; border: none; color: var(--admin-neon);
            font-size: 22px; cursor: pointer; display: flex; align-items: center;
        }

        .sidebar-menu { padding: 20px 0; flex: 1; }
        .tab-btn {
            width: 100%; display: flex; align-items: center; padding: 15px 22px;
            background: transparent; color: #888; border: none;
            border-left: 4px solid transparent; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.03); color: white; }
        .tab-btn.active {
            color: var(--admin-neon); border-left-color: var(--admin-neon);
            background: rgba(46, 204, 113, 0.07); font-weight: bold;
        }
        .tab-btn .icon { margin-right: 15px; font-size: 18px; width: 20px; text-align: center; }
        .sidebar.collapsed .tab-btn .icon { margin-right: 0; width: 100%; }
        .sidebar.collapsed .tab-btn .text { display: none; }

        /* NỘI DUNG CHÍNH */
        .main-content { flex: 1; margin-left: 240px; padding: 30px; transition: 0.3s ease; }
        .main-content.expanded { margin-left: 70px; }
        .header-title { text-align: center; color: var(--admin-neon); font-size: 24px; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }

        .card { background: var(--glass-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border); margin-bottom: 25px; backdrop-filter: blur(10px); }
        .card h3 { margin-top: 0; color: var(--admin-neon); border-bottom: 1px solid var(--glass-border); padding-bottom: 12px; font-size: 15px; }

        /* TAB CONTENT */
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        /* DEVICES & TABLES */
        .device { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--glass-border); gap: 15px; }
        .device-img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); }
        .device-qr { width: 90px; height: 90px; background: white; padding: 5px; border-radius: 8px; cursor: zoom-in; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .free { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        .using { background: rgba(241, 196, 15, 0.1); color: #f1c40f; border: 1px solid #f1c40f; }
        .broken { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); color: var(--admin-neon); }
        .btn-main { background: linear-gradient(45deg, var(--admin-neon), #27ae60); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; padding: 12px; color: #f39c12; border-bottom: 1px solid rgba(243, 156, 18, 0.2); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; color: #333; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-text">NAB LAB PRO</div>
            <button class="menu-toggle-btn" onclick="toggleSidebar()">&#9776;</button>
        </div>
        <div class="sidebar-menu">
            <button class="tab-btn active" onclick="openTab(event, 'tab-dashboard')">
                <span class="icon">📊</span><span class="text">TỔNG QUAN</span>
            </button>
            <button class="tab-btn" onclick="openTab(event, 'tab-devices')">
                <span class="icon">🛠</span><span class="text">THIẾT BỊ</span>
            </button>
            <button class="tab-btn" onclick="openTab(event, 'tab-booking')">
                <span class="icon">📅</span><span class="text">ĐẶT LỊCH</span>
            </button>
            <button class="tab-btn" onclick="openTab(event, 'tab-history')">
                <span class="icon">🕒</span><span class="text">NHẬT KÝ</span>
            </button>
        </div>
        <div class="sidebar-footer">
            <button onclick="logout()" style="width:100%; background:none; color:#e74c3c; border:1px solid #e74c3c; border-radius:10px; padding:10px; cursor:pointer;">🚪 ĐĂNG XUẤT</button>
        </div>
    </div>

    <div class="main-content" id="main-content">
        <div class="header-title">HỆ THỐNG QUẢN TRỊ VIÊN</div>

        <div id="tab-dashboard" class="tab-content active">
            <div class="card" style="display: flex; gap: 30px; align-items: center; justify-content: center; flex-wrap: wrap;">
                <div style="width: 150px; height: 150px;"><canvas id="adminChart"></canvas></div>
                <div id="quick-stats" style="line-height: 2; font-size: 14px;">Đang tải dữ liệu...</div>
            </div>
        </div>

        <div id="tab-devices" class="tab-content">
            <div class="card">
                <h3>🛠 THÊM / CẬP NHẬT THIẾT BỊ</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <input id="new-id" placeholder="Mã ID (VD: TB011)">
                    <input id="new-name" placeholder="Tên thiết bị">
                    <input id="new-image" style="grid-column: span 2;" placeholder="Link ảnh online (URL)">
                    <input id="new-usage" style="grid-column: span 2;" placeholder="Mô tả công dụng">
                    <input id="new-manual" style="grid-column: span 2;" placeholder="Quy trình vận hành">
                </div>
                <button class="btn-main" onclick="updateDeviceSystem()">🚀 CẬP NHẬT HỆ THỐNG</button>
            </div>
            <div class="card">
                <h3>📋 DANH SÁCH THIẾT BỊ</h3>
                <input id="search" placeholder="🔍 Tìm kiếm máy..." oninput="render()">
                <div id="list"></div>
            </div>
        </div>

        <div id="tab-booking" class="tab-content">
            <div class="card">
                <h3>📅 DUYỆT LỊCH ĐĂNG KÝ</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>THIẾT BỊ</th><th>NGƯỜI DÙNG</th><th>LỊCH ĐẶT</th><th>DỰ KIẾN</th><th>THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="booking-table-content"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="card">
                <h3>🕒 LỊCH SỬ HOẠT ĐỘNG</h3>
                <div id="history-list"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="exportFullHistory()" style="flex:1;">📊 XUẤT EXCEL</button>
                <button onclick="resetAll()" style="flex:1; border:1px solid #f39c12; color:#f39c12; background:none; border-radius:10px; cursor:pointer;">🔄 RESET DỮ LIỆU</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="closeQR()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-name">ID THIẾT BỊ</h2>
            <div id="big-qr" style="margin: 20px;"></div>
            <button onclick="closeQR()" style="width:100%; padding:12px; background:#000; color:#fff; border-radius:10px; border:none; cursor:pointer;">ĐÓNG</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="admin_script.js"></script>
</body>
</html>
