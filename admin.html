<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QR Lab Pro</title>
    <style>
    
        body { margin:0; font-family:-apple-system, sans-serif; background:linear-gradient(135deg,#4a6cf7,#7b9cff); color:white; min-height:100vh; }
        .header { padding:25px; text-align:center; font-size:24px; font-weight:bold; }
        .container { max-width:900px; margin:auto; padding-bottom: 50px; }
        .card { background:white; color:black; margin:15px; padding:20px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .card h3 { margin-top:0; color:#4a6cf7; border-bottom:1px solid #eee; padding-bottom:10px; }
        .device { display: flex; justify-content: space-between; align-items: center; padding:15px; border-bottom:1px solid #f0f0f0; gap: 15px; }
        .device-info { flex: 1; }
        .device-media { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 120px; }
        .device-img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; border: 2px solid #ddd; background:#eee; }
        .device-qr { width: 100px; height: 100px; background: white; padding: 5px; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center; border-radius: 8px; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:12px; border:1px solid #ddd; background:#f8fafc; box-sizing: border-box; }
        button { padding:10px 15px; border:none; border-radius:10px; margin:5px 0; cursor:pointer; font-weight: bold; }
        .fix { background:#2ecc71; color:white; width: 100%; }
        .reset { background:#f39c12; color:white; padding: 12px 20px; }
        .logout { background:#333; color:white; padding: 12px 20px; }
        .badge { padding:5px 10px; border-radius:10px; color:white; font-size:12px; font-weight: bold; display: inline-block; }
        .free { background:#2ecc71; }
        .using { background:#f1c40f; color: black; }
        .broken { background:#e74c3c; }
    </style>
</head>
<body>

<div class="header">👨‍💼 HỆ THỐNG QUẢN TRỊ QR LAB</div>

<div class="container">
    <div class="card">
        <h3>📅 Lịch sử sử dụng</h3>
        <div id="history-list">Đang tải...</div>
    </div>

    <div class="card">
        <h3>📋 Danh sách 10 thiết bị</h3>
        <input id="search" placeholder="🔍 Tìm nhanh thiết bị..." oninput="render()">
        <div id="list"></div>
    </div>

    <div class="card" style="text-align: center;">
        <button class="reset" onclick="resetAll()">🔄 Reset tất cả</button>
        <button class="logout" onclick="logout()">🚪 Đăng xuất</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>

<script src="admin_script.js"></script>

</body>
</html>
