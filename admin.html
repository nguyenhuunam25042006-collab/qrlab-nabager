<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin - QR Lab Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#4a6cf7,#7b9cff);
  color:white;
}

.header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  color:black;
  margin:15px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.device{
  padding:10px;
  border-bottom:1px solid #ddd;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  background:#f1f5f9;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.fix{background:#2ecc71;color:white;}
.delete{background:#e74c3c;color:white;}
.reset{background:#f39c12;color:white;}
.logout{background:#333;color:white;}

.badge{
  padding:5px 10px;
  border-radius:10px;
  color:white;
  font-size:12px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}
</style>

</head>

<body>

<div class="header">
👨‍💼 ADMIN DASHBOARD
</div>

<div class="container">

<!-- 📅 HISTORY -->
<div class="card">
  <h3>📅 Lịch sử sử dụng</h3>
  <div id="history">Chưa có dữ liệu</div>
</div>

<!-- 📋 DEVICE -->
<div class="card">
  <h3>📋 Danh sách thiết bị</h3>

  <input id="search" placeholder="🔍 Tìm thiết bị..." oninput="render()">

  <div id="list"></div>
</div>

<!-- ⚙️ CONTROL -->
<div class="card">
  <h3>⚙️ Quản lý</h3>
  <button class="reset" onclick="resetAll()">Reset tất cả</button>
  <button class="logout" onclick="logout()">Đăng xuất</button>
</div>

</div>

<script>

// 🔐 PHÂN QUYỀN
if(localStorage.getItem("role") !== "admin"){
  alert("❌ Không có quyền!");
  location.href = "./login.html";
}

// ===== LOAD DATA =====
let devices = JSON.parse(localStorage.getItem("devices")) || {};

// ===== FORMAT TIME =====
function formatTime(ms){
  let s = Math.floor(ms/1000);
  let m = Math.floor(s/60);
  s = s % 60;
  return m + "p " + s + "s";
}

// ===== RENDER DEVICE =====
function render(){

  let keyword = document.getElementById("search").value.toLowerCase();
  let html = "";

  Object.entries(devices).forEach(([id,d])=>{

    if(!d.name.toLowerCase().includes(keyword) && !id.toLowerCase().includes(keyword)){
      return;
    }

    let color="free";
    if(d.status==="Đang sử dụng") color="using";
    if(d.status==="Bị hỏng") color="broken";

    html += `
    <div class="device">
      <b>${d.name}</b> (${id})<br>

      <span class="badge ${color}">${d.status}</span><br>

      👤 ${d.user || "Chưa có"}<br>
      ⏱ ${formatTime(d.total || 0)}<br>

      <button class="fix" onclick="fix('${id}')">✔ Sửa</button>
      <button class="delete" onclick="removeDevice('${id}')">❌ Xóa</button>
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "Không tìm thấy";
}

// ===== HISTORY =====
function renderHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];

  let html="";
  history.slice(-10).reverse().forEach(h=>{
    html+=`
    <div class="device">
      <b>${h.device}</b><br>
      👤 ${h.user}<br>
      ⏱ ${h.duration}<br>
      🕒 ${h.time}
    </div>
    `;
  });

  document.getElementById("history").innerHTML = html || "Chưa có dữ liệu";
}

// ===== SAVE =====
function save(){
  localStorage.setItem("devices", JSON.stringify(devices));
  render();
  renderHistory();
}

// ===== FIX =====
function fix(id){
  devices[id].status="Trống";
  devices[id].user="";
  devices[id].start=null;
  save();
}

// ===== DELETE =====
function removeDevice(id){
  if(confirm("Xóa thiết bị?")){
    delete devices[id];
    save();
  }
}

// ===== RESET =====
function resetAll(){
  if(confirm("Reset toàn bộ?")){
    Object.keys(devices).forEach(id=>{
      devices[id].status="Trống";
      devices[id].user="";
      devices[id].start=null;
      devices[id].total=0;
    });
    save();
  }
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("role");
  location.href = "./login.html";
}

// 🔥 REALTIME UPDATE
window.addEventListener("storage", ()=>{
  devices = JSON.parse(localStorage.getItem("devices")) || {};
  render();
  renderHistory();
});

// INIT
render();
renderHistory();

</script>

</body>
</html>
</script>

</body>
</html>
