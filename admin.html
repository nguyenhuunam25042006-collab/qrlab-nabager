<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - QR Lab Pro</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #4a6cf7, #7b9cff); color: #333; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .container { width: 100%; max-width: 650px; }
        .header { text-align: center; color: white; font-size: 24px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .card { background: white; color: black; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); margin-bottom: 20px; }
        .card h3 { margin-top: 0; color: #4a6cf7; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .device { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; gap: 15px; }
        .device-info { flex: 1; }
        .device-media { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 110px; }
        .device-img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; border: 2px solid #ddd; }
        
        .device-qr { width: 100px; height: 100px; background: white; padding: 5px; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center; border-radius: 8px; cursor: zoom-in; transition: 0.3s; }
        .device-qr:hover { transform: scale(1.05); border-color: #4a6cf7; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; background: #f8fafc; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .fix { background: #2ecc71; color: white; width: 100%; margin-top: 10px; padding: 12px; border-radius: 12px; }
        .reset { background: #f39c12; color: white; width: 100%; margin-bottom: 10px; }
        .logout { background: #333; color: white; width: 100%; }
        .export { background: #27ae60; color: white; width: 100%; margin-bottom: 10px; } /* Nút xuất Excel mới */
        .badge { padding: 4px 10px; border-radius: 8px; color: white; font-size: 12px; font-weight: bold; }
        .free { background: #2ecc71; }
        .using { background: #f1c40f; color: black; }
        .broken { background: #e74c3c; }
        #history-list { font-size: 14px; max-height: 250px; overflow-y: auto; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background-color: white; padding: 25px; border-radius: 30px; text-align: center; max-width: 90%; animation: zoomIn 0.3s ease; }
        #big-qr img { width: 280px !important; height: 280px !important; margin: 0 auto; }
        .close-btn { margin-top: 20px; background: #333; color: white; width: 100%; padding: 12px; border-radius: 12px; }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">👨‍💼 HỆ THỐNG QUẢN TRỊ QR LAB</div>
        <div class="card">
            <h3>📅 Lịch sử sử dụng</h3>
            <div id="history-list">Đang tải dữ liệu...</div>
        </div>
        <div class="card">
            <h3>📋 Danh sách 10 thiết bị</h3>
            <input id="search" placeholder="🔍 Tìm nhanh thiết bị..." oninput="render()">
            <div id="list"></div>
        </div>
        <div class="card" style="text-align: center;">
            <button class="export" onclick="exportFullHistory()">📊 Xuất Nhật ký (Excel)</button>
            <button class="reset" onclick="resetAll()">🔄 Reset tất cả trạng thái</button>
            <button class="logout" onclick="logout()">🚪 Đăng xuất</button>
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="closeQR()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-name" style="margin-bottom: 15px; color: #4a6cf7;">Tên thiết bị</h3>
            <div id="big-qr"></div>
            <p style="color: #666; margin-top: 15px; font-size: 14px;">Đưa điện thoại lại gần để quét mã</p>
            <button class="close-btn" onclick="closeQR()">Đóng lại</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
    <script>
        if(localStorage.getItem("role") !== "admin") location.href = "./login.html";

        let devices = JSON.parse(localStorage.getItem("devices")) || {
            "TB001": { name: "Tủ sấy", status: "Trống", user: "", total: 0 },
            "TB002": { name: "Thiết bị thí nghiệm hằn lún vết bánh xe", status: "Trống", user: "", total: 0 },
            "TB003": { name: "Thiết bị thí nghiệm Marshall tự động", status: "Trống", user: "", total: 0 },
            "TB004": { name: "Thiết bị đầm bê tông nhựa", status: "Trống", user: "", total: 0 },
            "TB005": { name: "Thiết bị xác định hàm lượng parafin trong nhựa", status: "Trống", user: "", total: 0 },
            "TB006": { name: "Thiết bị xác định độ kéo dài của nhựa", status: "Trống", user: "", total: 0 },
            "TB007": { name: "Thiết bị xác định độ nhớt Brookfield", status: "Trống", user: "", total: 0 },
            "TB008": { name: "Thiết bị xác định độ tổn thất khối lượng của nhựa đường", status: "Trống", user: "", total: 0 },
            "TB009": { name: "Máy cắt mẫu bê tông xi măng", status: "Trống", user: "", total: 0 },
            "TB010": { name: "Thiết bị bảo dưỡng mẫu bê tông xi măng", status: "Trống", user: "", total: 0 }
        };

        function formatTime(ms) { if(!ms) return "0p 0s"; let s = Math.floor(ms/1000); return Math.floor(s/60) + "p " + (s % 60) + "s"; }

        function render() {
            let keyword = document.getElementById("search").value.toLowerCase();
            let listDiv = document.getElementById("list"); listDiv.innerHTML = "";
            let queues = JSON.parse(localStorage.getItem("queues")) || {}; // Lấy dữ liệu hàng đợi

            Object.entries(devices).forEach(([id, d]) => {
                if (!d.name.toLowerCase().includes(keyword) && !id.toLowerCase().includes(keyword)) return;
                let color = d.status === "Đang sử dụng" ? "using" : (d.status === "Bị hỏng" ? "broken" : "free");
                
                // Kiểm tra xem máy có ai đang chờ không
                let qCount = queues[id] ? queues[id].length : 0;
                let queueHtml = qCount > 0 ? `<br><small style="color:#e67e22">⏳ Đang chờ: <b>${qCount} người</b></small>` : "";

                let devEl = document.createElement("div"); devEl.className = "device";
                devEl.innerHTML = `
                    <div class="device-info">
                        <b>${d.name}</b> (${id})${queueHtml}<br>
                        <span class="badge ${color}">${d.status}</span><br>
                        <small>ND: <b>${d.user || "Trống"}</b> | Tổng: ${formatTime(d.total)}</small><br>
                        <button class="fix" onclick="fix('${id}')">✔ Reset máy</button>
                    </div>
                    <div class="device-media">
                        <img src="images/${id}.jpg" class="device-img" onerror="this.src='https://via.placeholder.com/100?text=No+Photo'">
                        <div id="qr-${id}" class="device-qr" onclick="zoomQR('${id}', '${d.name}')" title="Bấm để phóng to"></div>
                    </div>`;
                listDiv.appendChild(devEl);
                let qrUrl = `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`;
                new QRCode(document.getElementById(`qr-${id}`), { text: qrUrl, width: 100, height: 100 });
            });
        }

        function zoomQR(id, name) {
            document.getElementById("modal-name").innerText = name + " (" + id + ")";
            const bigQrDiv = document.getElementById("big-qr");
            bigQrDiv.innerHTML = "";
            let qrUrl = `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`;
            new QRCode(bigQrDiv, { text: qrUrl, width: 280, height: 280 });
            document.getElementById("qrModal").style.display = "flex";
        }

        function closeQR() { document.getElementById("qrModal").style.display = "none"; }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem("history")) || [];
            let historyDiv = document.getElementById("history-list");
            if (!historyDiv) return;
            if (history.length === 0) { historyDiv.innerHTML = "Chưa có dữ liệu lịch sử."; return; }
            historyDiv.innerHTML = history.slice(-10).reverse().map(h => 
                `<div style="font-size:13px; border-bottom:1px solid #eee; padding:8px 0; color:#333;">
                    <b style="color:#4a6cf7;">${h.device}</b> - 👤 ${h.user}<br>
                    <small>⏱ Dùng: ${h.duration} | 📅 ${h.time}</small>
                </div>`
            ).join("");
        }

        function save() { 
            localStorage.setItem("devices", JSON.stringify(devices)); 
            render(); 
            renderHistory(); 
        }
        
        function fix(id) { 
            devices[id].status = "Trống"; 
            devices[id].user = ""; 
            devices[id].start = null; 
            save(); 
        }
        
        function resetAll() { 
            if(confirm("Reset tất cả?")) { 
                Object.keys(devices).forEach(id => { 
                    devices[id].status="Trống"; 
                    devices[id].user="";
                    devices[id].total=0; 
                }); 
                localStorage.removeItem("history"); 
                localStorage.removeItem("queues"); // Reset luôn cả hàng đợi
                save(); 
            } 
        }

        function logout() { localStorage.removeItem("role"); location.href = "./login.html"; }

        // MỚI: Hàm xuất lịch sử ra file Excel (CSV) cho Admin
        function exportFullHistory() {
            let history = JSON.parse(localStorage.getItem("history")) || [];
            if(history.length === 0) return alert("Không có dữ liệu nhật ký!");
            let csv = "\uFEFFThiết bị,Người dùng,Thời gian sử dụng,Ngày tháng\n";
            history.forEach(h => { csv += `${h.device},${h.user},${h.duration},${h.time}\n`; });
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Bao_cao_Lab_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
        
        window.addEventListener("storage", (e) => { 
            if (e.key === "devices" || e.key === "history" || e.key === "queues") {
                devices = JSON.parse(localStorage.getItem("devices")); 
                render(); 
                renderHistory(); 
            }
        });
        
        render(); 
        renderHistory();
        
        setInterval(() => {
            devices = JSON.parse(localStorage.getItem("devices"));
            render();
            renderHistory();
        }, 2000); 
    </script>
</body>
</html>
