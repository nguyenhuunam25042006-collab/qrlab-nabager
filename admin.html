<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Admin - QR Lab Pro</title>
    <style>
        :root {
            --admin-neon: #2ecc71; /* Xanh lá quản trị */
            --bg-dark: #070a0f;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(46, 204, 113, 0.1);
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: rgba(255,255,255,0.9); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .container { width: 100%; max-width: 650px; }
        
        /* Header Neon Xanh lá */
        .header { text-align: center; color: var(--admin-neon); font-size: 26px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        
        /* Thẻ Kính mờ (Glassmorphism Card) */
        .card { background: var(--glass-bg); color: rgba(255,255,255,0.8); padding: 25px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); margin-bottom: 20px; backdrop-filter: blur(10px); }
        .card h3 { margin-top: 0; color: var(--admin-neon); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
        
        .device { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--glass-border); gap: 15px; }
        .device-info { flex: 1; }
        .device-media { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 110px; }
        
        .device-img { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); filter: grayscale(50%); transition: 0.3s; }
        .device:hover .device-img { filter: grayscale(0%); border-color: var(--admin-neon); }
        
        .device-qr { width: 100px; height: 100px; background: white; padding: 5px; border: 1px solid #ccc; display: flex; justify-content: center; align-items: center; border-radius: 8px; cursor: zoom-in; transition: 0.3s; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); box-sizing: border-box; color: var(--admin-neon); font-size: 15px; }
        input:focus { outline: none; border-color: var(--admin-neon); }

        /* Nút bấm Admin Neon */
        button { padding: 12px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
        button:active { transform: scale(0.97); }

        .fix { background: transparent; color: var(--admin-neon); width: 100%; margin-top: 10px; border: 1px solid var(--admin-neon); }
        .fix:hover { background: rgba(46, 204, 113, 0.1); box-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }

        .export { background: linear-gradient(45deg, var(--admin-neon), #27ae60); color: white; width: 100%; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .reset { background: transparent; border: 1px solid #f39c12; color: #f39c12; width: 100%; margin-bottom: 10px; }
        .reset:hover { background: rgba(243, 156, 18, 0.1); }
        
        .logout { background: rgba(255,255,255,0.05); color: #bdc3c7; width: 100%; border: 1px solid rgba(255,255,255,0.1); }

        /* Badge Trạng thái Admin */
        .badge { padding: 4px 10px; border-radius: 6px; color: white; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .free { background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; color: #2ecc71; }
        .using { background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; color: #f1c40f; }
        .broken { background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; color: #e74c3c; }
        
        #history-list { font-size: 13px; max-height: 250px; overflow-y: auto; color: rgba(255,255,255,0.7); }

        /* MODAL PHÓNG TO QR */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background-color: #ffffff; padding: 25px; border-radius: 20px; text-align: center; max-width: 90%; animation: zoomIn 0.3s ease; color: #333; }
        #big-qr img { width: 280px !important; height: 280px !important; margin: 0 auto; }
        .close-btn { margin-top: 20px; background: #000; color: white; width: 100%; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">HỆ THỐNG QUẢN TRỊ VIÊN</div>
        
        <div class="card">
            <h3>🕒 LỊCH SỬ SỬ DỤNG (10 HOẠT ĐỘNG GẦN NHẤT)</h3>
            <div id="history-list">ĐANG ĐỒNG BỘ DỮ LIỆU...</div>
        </div>

        <div class="card">
            <h3>📋 TRUNG TÂM QUẢN LÝ THIẾT BỊ (10 MÁY)</h3>
            <input id="search" placeholder="🔍 TÌM KIẾM THEO TÊN HOẶC MÃ ID..." oninput="render()">
            <div id="list"></div>
        </div>

        <div class="card" style="text-align: center;">
            <button class="export" onclick="exportFullHistory()">📊 XUẤT NHẬT KÝ (FILE EXCEL)</button>
            <button class="reset" onclick="resetAll()">🔄 RESET TOÀN BỘ TRẠNG THÁI</button>
            <button class="logout" onclick="logout()">🚪 ĐĂNG XUẤT KHỎI HỆ THỐNG</button>
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="closeQR()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modal-name" style="margin-bottom: 15px; color: #000; text-transform: uppercase;">ID THIẾT BỊ</h3>
            <div id="big-qr"></div>
            <p style="color: #666; margin-top: 15px; font-size: 14px;">HƯỚNG CAMERA VÀO MÃ ĐỂ QUÉT</p>
            <button class="close-btn" onclick="closeQR()">ĐÓNG LẠI</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
    <script>
        // Copy toàn bộ logic JavaScript Admin của bạn vào đây (đảm bảo role admin)
        if(localStorage.getItem("role") !== "admin") location.href = "./login.html";

        let devices = JSON.parse(localStorage.getItem("devices")) || {
            "TB001": { name: "Tủ sấy", status: "Trống", user: "", total: 0 },
            "TB002": { name: "Hằn lún vết bánh xe", status: "Trống", user: "", total: 0 },
            "TB003": { name: "Marshall tự động", status: "Trống", user: "", total: 0 },
            "TB004": { name: "Đầm bê tông nhựa", status: "Trống", user: "", total: 0 },
            "TB005": { name: "Parafin nhựa", status: "Trống", user: "", total: 0 },
            "TB006": { name: "Kéo dài của nhựa", status: "Trống", user: "", total: 0 },
            "TB007": { name: "Độ nhớt Brookfield", status: "Trống", user: "", total: 0 },
            "TB008": { name: "Tổn thất khối lượng nhựa", status: "Trống", user: "", total: 0 },
            "TB009": { name: "Cắt mẫu bê tông xi măng", status: "Trống", user: "", total: 0 },
            "TB010": { name: "Bảo dưỡng mẫu bê tông xi măng", status: "Trống", user: "", total: 0 }
        };

        function formatTime(ms) { if(!ms) return "0p 0s"; let s = Math.floor(ms/1000); return Math.floor(s/60) + "p " + (s % 60) + "s"; }

        function render() {
            let keyword = document.getElementById("search").value.toLowerCase();
            let listDiv = document.getElementById("list"); listDiv.innerHTML = "";
            let queues = JSON.parse(localStorage.getItem("queues")) || {};

            Object.entries(devices).forEach(([id, d]) => {
                if (!d.name.toLowerCase().includes(keyword) && !id.toLowerCase().includes(keyword)) return;
                let color = d.status === "Đang sử dụng" ? "using" : (d.status === "Bị hỏng" ? "broken" : "free");
                
                let qCount = queues[id] ? queues[id].length : 0;
                let queueHtml = qCount > 0 ? `<br><small style="color:#e67e22">⏳ ĐANG CHỜ: <b>${qCount} NGƯỜI</b></small>` : "";

                let devEl = document.createElement("div"); devEl.className = "device";
                devEl.innerHTML = `
                    <div class="device-info">
                        <b>${d.name}</b> (${id})${queueHtml}<br>
                        <span class="badge ${color}">${d.status}</span><br>
                        <small>NGƯỜI DÙNG: <b>${d.user || "TRỐNG"}</b> | TỔNG GIỜ: ${formatTime(d.total)}</small><br>
                        <button class="fix" onclick="fix('${id}')">✔ RESET MÁY</button>
                    </div>
                    <div class="device-media">
                        <img src="images/${id}.jpg" class="device-img" onerror="this.src='https://via.placeholder.com/100?text=No+Photo'">
                        <div id="qr-${id}" class="device-qr" onclick="zoomQR('${id}', '${d.name}')" title="Phóng to"></div>
                    </div>`;
                listDiv.appendChild(devEl);
                let qrUrl = `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`;
                new QRCode(document.getElementById(`qr-${id}`), { text: qrUrl, width: 100, height: 100 });
            });
        }

        function zoomQR(id, name) {
            document.getElementById("modal-name").innerText = name + " (" + id + ")";
            const bigQrDiv = document.getElementById("big-qr");
            bigQrDiv.innerHTML = "";
            let qrUrl = `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`;
            new QRCode(bigQrDiv, { text: qrUrl, width: 280, height: 280 });
            document.getElementById("qrModal").style.display = "flex";
        }

        function closeQR() { document.getElementById("qrModal").style.display = "none"; }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem("history")) || [];
            let historyDiv = document.getElementById("history-list");
            if (!historyDiv) return;
            if (history.length === 0) { historyDiv.innerHTML = "Chưa có dữ liệu lịch sử."; return; }
            historyDiv.innerHTML = history.slice(-10).reverse().map(h => 
                `<div style="font-size:12px; border-bottom:1px solid var(--glass-border); padding:8px 0;">
                    <b style="color:var(--admin-neon);">${h.device}</b> - 👤 ${h.user}<br>
                    <small>⏱ THỜI GIAN DÙNG: ${h.duration} | 📅 NGÀY: ${h.time}</small>
                </div>`
            ).join("");
        }

        function save() { 
            localStorage.setItem("devices", JSON.stringify(devices)); 
            render(); 
            renderHistory(); 
        }
        
        function fix(id) { 
            devices[id].status = "Trống"; 
            devices[id].user = ""; 
            devices[id].start = null; 
            save(); 
        }
        
        function resetAll() { 
            if(confirm("Xác nhận reset toàn bộ hệ thống?")) { 
                Object.keys(devices).forEach(id => { 
                    devices[id].status="Trống"; 
                    devices[id].user="";
                    devices[id].total=0; 
                }); 
                localStorage.removeItem("history"); 
                localStorage.removeItem("queues");
                save(); 
            } 
        }

        function logout() { localStorage.removeItem("role"); location.href = "./login.html"; }

        function exportFullHistory() {
            let history = JSON.parse(localStorage.getItem("history")) || [];
            if(history.length === 0) return alert("Không có nhật ký để xuất!");
            let csv = "\uFEFFThiết bị,Người dùng,Thời gian sử dụng,Ngày tháng\n";
            history.forEach(h => { csv += `${h.device},${h.user},${h.duration},${h.time}\n`; });
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Nhat_Ky_Lab_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
        
        window.addEventListener("storage", (e) => { 
            if (e.key === "devices" || e.key === "history" || e.key === "queues") {
                devices = JSON.parse(localStorage.getItem("devices")); 
                render(); 
                renderHistory(); 
            }
        });
        
        render(); 
        renderHistory();
        setInterval(() => {
            devices = JSON.parse(localStorage.getItem("devices"));
            render();
            renderHistory();
        }, 2000); 
    </script>
</body>
</html>
