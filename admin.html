<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị QR Lab - Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #4a6cf7; color: #333; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 650px; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; }
        h3 { color: #4a6cf7; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        .device { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .badge { padding: 5px 10px; border-radius: 8px; color: white; font-size: 12px; font-weight: bold; }
        .free { background: #2ecc71; } .using { background: #f1c40f; color: black; } .broken { background: #e74c3c; }
        
        .device-qr { width: 90px; height: 90px; border: 1px solid #ddd; padding: 5px; cursor: zoom-in; }
        .device-img { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; }

        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .fix { background: #2ecc71; color: white; width: 100%; padding: 12px; border-radius: 10px; margin-top: 8px; }
        .reset { background: #f39c12; color: white; width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        
        #history-list { font-size: 14px; max-height: 250px; overflow-y: auto; }
        
        /* Modal phóng to QR */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>👨‍💼 QUẢN TRỊ VIÊN QR LAB</h2></div>

    <div class="card">
        <h3>📅 Lịch sử sử dụng (Cloud)</h3>
        <div id="history-list">Đang kết nối Cloud...</div>
    </div>

    <div class="card">
        <h3>📋 Trạng thái thiết bị</h3>
        <input type="text" id="search" placeholder="🔍 Tìm máy..." style="width:100%; padding:12px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd;" oninput="render()">
        <div id="list">Đang tải dữ liệu...</div>
    </div>

    <button class="reset" onclick="resetAll()">🔄 Reset toàn bộ hệ thống</button>
</div>

<div id="qrModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="m-name" style="color:#4a6cf7"></h3>
        <div id="big-qr" style="display:flex; justify-content:center;"></div>
        <button onclick="document.getElementById('qrModal').style.display='none'" style="margin-top:20px; padding:10px 25px; border-radius:10px; background:#333; color:white;">Đóng</button>
    </div>
</div>

<script>
    // 1. Cấu hình Firebase của Nam
    const firebaseConfig = {
        apiKey: "AIzaSyADJ5ugzW6ttbiUymfEkjBCJ-6Cd5UaCNc",
        authDomain: "qrlab-c1704.firebaseapp.com",
        databaseURL: "https://qrlab-c1704-default-rtdb.firebaseio.com",
        projectId: "qrlab-c1704",
        storageBucket: "qrlab-c1704.firebasestorage.app",
        messagingSenderId: "307225910652",
        appId: "1:307225910652:web:364021a27bd2798ba618f9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let devices = {};

    function formatTime(ms) { if(!ms) return "0p 0s"; let s = Math.floor(ms/1000); return Math.floor(s/60) + "p " + (s % 60) + "s"; }

    // 2. Lắng nghe Cloud (Tự động chạy khi Điện thoại bấm nút)
    db.ref().on('value', (snapshot) => {
        const data = snapshot.val() || {};
        devices = data.devices || {};
        render();
        
        if (data.history) {
            const historyArray = Object.values(data.history);
            renderHistory(historyArray);
        } else {
            document.getElementById("history-list").innerHTML = "Chưa có dữ liệu.";
        }
    });

    // 3. Vẽ danh sách máy
    function render() {
        const listDiv = document.getElementById("list");
        const keyword = document.getElementById("search").value.toLowerCase();
        listDiv.innerHTML = "";

        Object.entries(devices).forEach(([id, d]) => {
            if (!d.name.toLowerCase().includes(keyword)) return;
            let color = d.status === "Đang sử dụng" ? "using" : (d.status === "Bị hỏng" ? "broken" : "free");
            
            let div = document.createElement("div");
            div.className = "device";
            div.innerHTML = `
                <div style="flex:1">
                    <b>${d.name}</b> (${id})<br>
                    <span class="badge ${color}">${d.status}</span><br>
                    <small>👤: <b>${d.user || "Trống"}</b> | Tổng: ${formatTime(d.total)}</small><br>
                    <button class="fix" onclick="fixDevice('${id}')">Reset máy</button>
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <img src="images/${id}.jpg" class="device-img" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
                    <div id="qr-${id}" class="device-qr" onclick="zoom('${id}', '${d.name}')"></div>
                </div>
            `;
            listDiv.appendChild(div);

            new QRCode(document.getElementById(`qr-${id}`), {
                text: `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`,
                width: 80, height: 80
            });
        });
    }

    // 4. Vẽ lịch sử
    function renderHistory(history) {
        document.getElementById("history-list").innerHTML = history.slice(-10).reverse().map(h => `
            <div style="padding:10px 0; border-bottom:1px solid #eee; font-size:13px;">
                <b style="color:#4a6cf7">${h.device}</b> - 👤 ${h.user}<br>
                <small>⏱ ${h.duration} | 📅 ${h.time}</small>
            </div>
        `).join("");
    }

    // 5. Điều khiển Cloud
    function fixDevice(id) {
        db.ref(`devices/${id}`).update({ status: "Trống", user: "", start: null });
    }

    function resetAll() {
        if(confirm("Xóa sạch toàn bộ dữ liệu trên Cloud?")) {
            // Khởi tạo lại 10 máy trống
            const initData = {};
            for(let i=1; i<=10; i++){
                let id = "TB" + (i<10?"00":"0") + i;
                initData[id] = { name: "Máy " + id, status: "Trống", user: "", total: 0 };
            }
            db.ref('devices').set(initData);
            db.ref('history').remove();
        }
    }

    function zoom(id, name) {
        document.getElementById("m-name").innerText = name;
        document.getElementById("big-qr").innerHTML = "";
        new QRCode(document.getElementById("big-qr"), {
            text: `https://nguyenhuunam25042006-collab.github.io/qrlab-nabager/index.html?id=${id}`,
            width: 250, height: 250
        });
        document.getElementById("qrModal").style.display = "flex";
    }
</script>
</body>
</html>
