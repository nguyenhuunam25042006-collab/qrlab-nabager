<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Lab Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f1f3f6;
}

header{
background:linear-gradient(135deg,#5a6ff0,#3f51b5);
color:white;
text-align:center;
padding:30px 10px;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
border-radius:14px;
padding:16px;
margin-bottom:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
background:#5a6ff0;
color:white;
}

button.red{
background:#e74c3c;
}

.device{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.stat{
display:flex;
justify-content:space-between;
padding:6px 0;
}

#reader{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h2>🔬 QR Lab Manager</h2>
<p>Quản lý thiết bị phòng Lab</p>

</header>

<div class="container">

<div class="card">

<button onclick="startScan()">📷 Quét QR thiết bị</button>

<div id="reader"></div>

<p id="result"></p>

<button onclick="openForm()">📅 Đăng ký sử dụng</button>

<button class="red" onclick="report()">⚠️ Báo hỏng thiết bị</button>

</div>

<div class="card">

<h3>📊 Trạng thái thiết bị</h3>

<div class="device">
<span>TB001</span>
<span id="TB001"></span>
</div>

<div class="device">
<span>TB002</span>
<span id="TB002"></span>
</div>

<div class="device">
<span>TB003</span>
<span id="TB003"></span>
</div>

</div>

<div class="card">

<h3>📈 Thống kê sử dụng</h3>

<div class="stat">
<span>Tổng lượt sử dụng</span>
<span id="total"></span>
</div>

<div class="stat">
<span>Thiết bị đang dùng</span>
<span id="using"></span>
</div>

<div class="stat">
<span>Thiết bị hỏng</span>
<span id="broken"></span>
</div>

</div>

</div>

<script>

const formLink="https://forms.gle/swQgBUYASe1Hinaw7";

const sheetURL="https://docs.google.com/spreadsheets/d/1ruY2FegopOUprLRQ3WV0UfLKFwLPvU-wOysibaBoWvI/gviz/tq?tqx=out:json";

let lastDevice="";

function startScan(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(qrCodeMessage)=>{

lastDevice = qrCodeMessage.trim().toUpperCase();

document.getElementById("result").innerHTML =
"Thiết bị: <b>"+lastDevice+"</b>";

html5QrCode.stop();

}

);

}

function openForm(){

if(lastDevice===""){
alert("Hãy quét thiết bị trước");
return;
}

window.open(formLink,"_blank");

}

function report(){

if(lastDevice===""){
alert("Quét thiết bị trước");
return;
}

window.open(formLink,"_blank");

}

async function loadData(){

const res = await fetch(sheetURL);

const text = await res.text();
  const json = JSON.parse(text.substring(47).slice(0,-2));

const rows = json.table.rows;

let devices={
TB001:"Trống",
TB002:"Trống",
TB003:"Trống"
};

let total=0;
let using=0;
let broken=0;

rows.forEach(r=>{

const device = r.c[3]?.v;
const status = r.c[7]?.v;

if(device){

devices[device]=status;

total++;

if(status==="Đang sử dụng") using++;

if(status==="Bị hỏng") broken++;

}

});

updateDevices(devices);

document.getElementById("total").innerHTML=total;
document.getElementById("using").innerHTML=using;
document.getElementById("broken").innerHTML=broken;

}

function updateDevices(d){

setStatus("TB001",d.TB001);
setStatus("TB002",d.TB002);
setStatus("TB003",d.TB003);

}

function setStatus(id,status){

let el=document.getElementById(id);

if(status==="Đang sử dụng"){
el.innerHTML="🟡 "+status;
}
else if(status==="Bị hỏng"){
el.innerHTML="🔴 "+status;
}
else{
el.innerHTML="🟢 Trống";
}

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
