<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>QR Lab Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.header{
background:#4f6df5;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.scan-btn{
background:#3498db;
color:white;
width:100%;
margin-bottom:10px;
}

.report-btn{
background:#ff5e5e;
color:white;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:left;
}

.status-table td{
font-weight:bold;
}

@media(max-width:600px){

.container{
padding:10px;
}

}

</style>

</head>

<body>

<div class="header">
<h2>🔬 QR Lab Manager</h2>
<p>Hệ thống quản lý thiết bị phòng Lab</p>
</div>

<div class="container">

<div class="card">

<button class="scan-btn" onclick="startScan()">📷 Quét QR thiết bị</button>

<div id="reader" style="width:250px;margin:auto"></div>

<div id="result" style="margin-top:15px;font-weight:bold"></div>

<button class="report-btn" onclick="report()">⚠️ Báo hỏng thiết bị</button>

</div>

<div class="card">

<h3>📊 Trạng thái thiết bị</h3>

<table class="status-table">

<tr>
<th>Thiết bị</th>
<th>Trạng thái</th>
</tr>

<tr>
<td>TB001</td>
<td>🟢 Trống</td>
</tr>

<tr>
<td>TB002</td>
<td>🟡 Đang sử dụng</td>
</tr>

<tr>
<td>TB003</td>
<td>🔴 Bị hỏng</td>
</tr>

</table>

</div>

<div class="card">

<h3>🧾 Lịch sử quét</h3>

<table>

<tr>
<th>Thiết bị</th>
<th>Thời gian</th>
</tr>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<script src="devices.js"></script>
<script src="script.js"></script>

</body>
</html>
