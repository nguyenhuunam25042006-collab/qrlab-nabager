<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Lab Pro - Người dùng</title>
    <style>
        /* 🎨 CSS GIAO DIỆN CÔNG NGHỆ TƯƠNG LAI (FUTURISTIC UI) */
        :root {
            --primary-neon: #00f2fe; /* Xanh Cyan công nghệ */
            --secondary-neon: #4facfe; /* Xanh dương đậm */
            --bg-dark: #0a0e17; /* Nền tối */
            --text-main: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05); /* Kính mờ */
            --glass-border: rgba(255, 255, 255, 0.1); /* Viền kính */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Hiệu ứng radar quét nền */
        body::before {
            content: '';
            position: absolute;
            width: 150vw;
            height: 150vh;
            background-image: radial-gradient(var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            animation: radar 120s linear infinite;
            z-index: -1;
        }

        .main-container {
            width: 92%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        .header-section h1 {
            margin: 0;
            font-size: 32px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        .header-section p { margin: 5px 0; opacity: 0.7; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        /* Thẻ Kính mờ (Glassmorphism Card) */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Vùng hiển thị Camera */
        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
            border: 1px dashed var(--glass-border);
        }

        #result {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Badge Trạng thái Neon */
        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: inline-block;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .free { background: rgba(46, 204, 113, 0.2); border: 1px solid #2ecc71; color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .using { background: rgba(241, 196, 15, 0.2); border: 1px solid #f1c40f; color: #f1c40f; animation: neonPulse 1.5s infinite alternate; }
        .broken { background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }

        /* Nút bấm Neon (Cyber Button) */
        button {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button:active { transform: scale(0.97); }

        #btn-scan { background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon)); box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4); }
        #btn-use { background: rgba(46, 204, 113, 0.8); border: 1px solid #2ecc71; color: white; }
        #btn-queue { background: rgba(52, 73, 94, 0.8); border: 1px solid #7f8c8d; color: #bdc3c7; }
        #btn-checkin { background: rgba(142, 68, 173, 0.8); border: 1px solid #9b59b6; color: white; }
        #btn-stop { background: rgba(243, 156, 18, 0.8); border: 1px solid #f39c12; color: white; }
        #btn-error { background: rgba(231, 76, 60, 0.8); border: 1px solid #e74c3c; color: white; }
        #btn-log { background: transparent; border: 1px solid var(--glass-border); color: #bdc3c7; margin-top: 15px; font-size: 13px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            font-size: 16px;
            color: var(--primary-neon);
            text-align: center;
        }

        input:focus { outline: none; border-color: var(--primary-neon); }

        /* Biểu đồ */
        .chart-container {
            height: 220px;
            margin-top: 10px;
        }

        /* Animations */
        @keyframes radar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes neonPulse { from { box-shadow: 0 0 5px #f1c40f; } to { box-shadow: 0 0 15px #f1c40f, 0 0 25px rgba(241, 196, 15, 0.5); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <h1>🔬 QR Lab Pro</h1>
            <p>ĐIỀU KHIỂN THIẾT BỊ NÂNG CAO</p>
        </div>

        <div class="card">
            <div id="reader"></div> 
            <div id="result">
                <p style="color: #666; font-size: 12px; text-transform: uppercase;">QUÉT MÃ QR THIẾT BỊ ĐỂ BẮT ĐẦU</p>
            </div>

            <button id="btn-scan" onclick="startScan()">📷 KHỞI CHẠY MÁY QUÉT</button>
            
            <input id="user-name" placeholder="XÁC MINH TÊN NGƯỜI DÙNG...">
            
            <button id="btn-use" onclick="useDevice()">📅 BẮT ĐẦU VẬN HÀNH</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btn-queue" onclick="joinQueue()" style="font-size: 13px;">📝 ĐĂNG KÝ CHỜ</button>
                <button id="btn-checkin" onclick="checkInFromQueue()" style="font-size: 13px;">✅ XÁC NHẬN VÀO</button>
            </div>
            
            <button id="btn-stop" onclick="stopDevice()">⏹ KẾT THÚC SỬ DỤNG</button>
            <button id="btn-error" onclick="errorDevice()">⚠️ BÁO CÁO SỰ CỐ</button>
            
            <button id="btn-log" onclick="showLogbook()">📊 XEM NHẬT KÝ HỆ THỐNG</button>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; color: var(--primary-neon); font-size: 16px; letter-spacing: 1px; text-transform: uppercase;">
                📊 THỐNG KÊ TRẠNG THÁI
            </h3>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js?v=2.0"></script>

</body>
</html>
