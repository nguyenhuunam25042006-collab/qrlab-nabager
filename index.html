<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Test QR</h2>

<button onclick="startScan()">Quét QR</button>

<div id="reader" style="width:300px;"></div>

<script>
let scanner;

function startScan(){

const reader = document.getElementById("reader");
reader.innerHTML="";

if(scanner){
scanner.stop().then(()=>scanner.clear()).catch(()=>{});
}

scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(cameras => {

if(!cameras.length){
alert("Không có camera");
return;
}

let cam = cameras[0].id;

scanner.start(
cam,
{fps:10,qrbox:250},
(text)=>{
alert("Quét được: " + text);
}
);

}).catch(err=>{
alert("Lỗi: "+err);
});

}
</script>

</body>
</html>
