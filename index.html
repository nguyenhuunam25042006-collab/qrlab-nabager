<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>QR Lab Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
text-align:center;
color:white;
}

h1{
margin-bottom:5px;
}

.subtitle{
opacity:0.9;
margin-bottom:30px;
}

.card{
background:white;
color:#333;
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
border:none;
padding:12px 20px;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin-top:10px;
width:100%;
}

.scan-btn{
background:#3498db;
color:white;
}

.scan-btn:hover{
background:#2980b9;
}

.report-btn{
background:#ff5e5e;
color:white;
}

.report-btn:hover{
background:#e74c3c;
}

.result{
margin-top:20px;
font-size:16px;
font-weight:bold;
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🔬 QR Lab Manager</h1>
<p class="subtitle">Hệ thống quản lý thiết bị phòng Lab</p>

<div class="card">

<button class="scan-btn" onclick="startScan()">📷 Quét QR thiết bị</button>

<div id="reader" style="width:250px;margin:auto;margin-top:15px;"></div>

<div id="result" class="result"></div>

<button class="report-btn" onclick="report()">⚠️ Báo hỏng thiết bị</button>

</div>

<footer>
Lab Management System • 2026
</footer>

</div>

<script src="devices.js"></script>
<script src="script.js"></script>

</body>
</html>
