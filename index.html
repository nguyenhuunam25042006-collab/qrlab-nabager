<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Lab VIP</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#eef2ff,#dfe6ff);
}

/* HEADER */
.header{
padding:25px;
text-align:center;
color:white;
background:linear-gradient(135deg,#4a6cf7,#7b9cff);
border-radius:0 0 30px 30px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(15px);
padding:20px;
margin:15px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn:active{transform:scale(0.95);}

.primary{background:#4a6cf7;color:white;}
.success{background:#2ecc71;color:white;}
.danger{background:#ff4d4d;color:white;}

/* RESULT */
.result{
margin-top:10px;
padding:15px;
border-radius:15px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* STATUS */
.badge{
padding:6px 12px;
border-radius:10px;
color:white;
font-size:12px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="header">
<h2>🔬 QR Lab VIP</h2>
<p>Hệ thống quản lý thông minh</p>
</div>

<div class="card">
<button class="btn primary" onclick="scan()">📷 Quét QR</button>
<div id="reader"></div>
<div id="result"></div>

<button class="btn success" onclick="book()">📅 Sử dụng</button>
<button class="btn danger" onclick="report()">⚠️ Báo lỗi</button>
</div>

<div class="card">
<h3>📊 Thiết bị</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>📈 Thống kê</h3>
<canvas id="chart"></canvas>
</div>

<div class="nav">
<div onclick="location.reload()">🏠</div>
<div onclick="scan()">📷</div>
<div>📊</div>
</div>

<script src="script.js"></script>

</body>
</html>
