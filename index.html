<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Lab Pro</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(135deg,#4a6cf7,#7b9cff);
color:#333;
}

/* HEADER */
.header{
padding:30px 20px;
color:white;
text-align:center;
}

.header h2{
margin:0;
font-size:24px;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:10px;
}

/* CARD GLASS */
.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
border-radius:25px;
padding:20px;
margin-top:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.95);
}

.primary{background:white;color:#4a6cf7;}
.success{background:#2ecc71;color:white;}
.danger{background:#ff4d4d;color:white;}

/* SCANNER */
#reader{
width:100%;
margin-top:10px;
border-radius:15px;
overflow:hidden;
}

/* RESULT */
.result{
margin-top:15px;
padding:15px;
border-radius:18px;
background:white;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* STATUS */
.status{
padding:6px 12px;
border-radius:12px;
color:white;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
padding:12px;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.nav div{
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h2>🔬 QR Lab Pro</h2>
<p>Hệ thống quản lý thiết bị thông minh</p>
</div>

<div class="container">

<div class="card">

<button class="btn primary" onclick="startScan()">📷 Quét QR</button>

<div id="reader"></div>

<div id="result"></div>

<button class="btn success" onclick="useDevice()">📅 Sử dụng</button>
<button class="btn danger" onclick="errorDevice()">⚠️ Báo lỗi</button>

</div>

</div>

<div class="nav">
<div onclick="location.reload()">🏠</div>
<div onclick="startScan()">📷</div>
<div onclick="window.scrollTo(0,0)">⬆️</div>
</div>

<script src="script.js"></script>

</body>
</html>
