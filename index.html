<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Lab Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00c6ff);
text-align:center;
color:#333;
}

.header{
padding:40px 20px;
color:white;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
color:white;
cursor:pointer;
}

.scan{background:#4e73df;}
.use{background:#1cc88a;}
.error{background:#e74a3b;}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
}

.status{
padding:5px 10px;
border-radius:10px;
display:inline-block;
margin-top:5px;
}

.green{background:#1cc88a;color:white;}
.yellow{background:#f6c23e;color:white;}
.red{background:#e74a3b;color:white;}
</style>
</head>

<body>

<div class="header">
<h1>🔬 QR Lab Pro</h1>
<p>Quản lý thiết bị</p>
</div>

<div class="card">

<button class="scan" onclick="startScan()">📷 Quét QR</button>

<div id="reader" style="width:100%;margin-top:10px;"></div>

<input id="username" placeholder="Nhập tên người dùng...">

<div id="result"></div>

<button class="use" onclick="useDevice()">📅 Sử dụng</button>
<button class="error" onclick="releaseDevice()">🔄 Trả thiết bị</button>

</div>

<script src="script.js"></script>
</body>
</html>
