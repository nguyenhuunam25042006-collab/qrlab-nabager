<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Lab Manager Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--main:#4b5ff7;
--bg:#f4f6ff;
--card:#ffffff;
--text:#111;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#fff;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont;
transition:.3s;
}

header{
background:linear-gradient(135deg,#4b5ff7,#6b86ff);
color:white;
padding:30px;
text-align:center;
border-radius:0 0 25px 25px;
}

.container{
max-width:520px;
margin:auto;
padding:15px;
}

.card{
background:var(--card);
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.scan{background:#4b5ff7;color:white;}
.form{background:#2ecc71;color:white;}
.report{background:#e74c3c;color:white;}
.darkbtn{background:#111;color:#fff;}

.device{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.badge{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:13px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;color:black;}
.broken{background:#e74c3c;}

</style>
</head>

<body>

<header>
<h2>🔬 QR Lab Manager Pro</h2>
<p>Hệ thống quản lý thiết bị thông minh</p>
</header>

<div class="container">

<div class="card">

<button class="scan" onclick="scan()">📷 Quét QR</button>
<div id="reader"></div>

<p id="result">Chưa quét</p>

<button class="form" onclick="openForm()">📅 Đăng ký</button>
<button class="report" onclick="report()">⚠️ Báo hỏng</button>
<button class="darkbtn" onclick="toggleDark()">🌙 Dark mode</button>

</div>

<div class="card">

<h3>📊 Trạng thái thiết bị</h3>

<div class="device"><span>TB001</span><span id="TB001"></span></div>
<div class="device"><span>TB002</span><span id="TB002"></span></div>
<div class="device"><span>TB003</span><span id="TB003"></span></div>

</div>

<div class="card">

<h3>📈 Biểu đồ sử dụng</h3>
<canvas id="chart"></canvas>

</div>

</div>

<script>

const formLink="https://forms.gle/swQgBUYASe1Hinaw7";
const sheetURL="https://docs.google.com/spreadsheets/d/1ruY2FegopOUprLRQ3WV0UfLKFwLPvU-wOysibaBoWvI/gviz/tq?tqx=out:json";

let deviceNow="";
let chart;

function scan(){

const qr=new Html5Qrcode("reader");

qr.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(text)=>{

if(text.includes("http")){
text=text.split("/").pop();
}

deviceNow=text.trim().toUpperCase();

document.getElementById("result").innerHTML=
"✅ "+deviceNow;

qr.stop();

}
);

}

function openForm(){
if(deviceNow===""){alert("Quét trước");return;}
window.open(formLink,"_blank");
}

function report(){
  if(deviceNow===""){alert("Quét trước");return;}
window.open(formLink,"_blank");
}

function toggleDark(){
document.body.classList.toggle("dark");
}

async function load(){

const res=await fetch(sheetURL);
const txt=await res.text();
const json=JSON.parse(txt.substring(47).slice(0,-2));
const rows=json.table.rows;

let dev={TB001:"Trống",TB002:"Trống",TB003:"Trống"};
let using=0,free=0,broken=0;

rows.forEach(r=>{
const d=r.c[3]?.v;
const s=r.c[7]?.v;

if(d){
dev[d]=s;

if(s==="Đang sử dụng") using++;
else if(s==="Bị hỏng") broken++;
else free++;
}
});

setStatus("TB001",dev.TB001);
setStatus("TB002",dev.TB002);
setStatus("TB003",dev.TB003);

drawChart(using,free,broken);

}

function setStatus(id,s){

let el=document.getElementById(id);

if(s==="Đang sử dụng"){
el.innerHTML='<span class="badge using">🟡 Đang dùng</span>';
}
else if(s==="Bị hỏng"){
el.innerHTML='<span class="badge broken">🔴 Hỏng</span>';
}
else{
el.innerHTML='<span class="badge free">🟢 Trống</span>';
}

}

function drawChart(using,free,broken){

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Đang dùng","Trống","Hỏng"],
datasets:[{
data:[using,free,broken],
backgroundColor:["#f1c40f","#2ecc71","#e74c3c"]
}]
}
});

}

load();
setInterval(load,5000);

</script>

</body>
</html>
