<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>TEST QR</h2>

<button onclick="start()">Quét</button>
<div id="reader" style="width:300px"></div>

<script>
let scanner;

async function start(){

  if(scanner){
    await scanner.stop();
  }

  scanner = new Html5Qrcode("reader");

  try{
    await navigator.mediaDevices.getUserMedia({ video:true });

    const cams = await Html5Qrcode.getCameras();

    await scanner.start(
      cams[0].id,
      { fps: 10, qrbox: 250 },
      (text)=>{
        alert("Quét được: " + text);
        scanner.stop();
      }
    );

  }catch(e){
    alert("Lỗi camera");
    console.log(e);
  }
}
</script>

</body>
</html>
