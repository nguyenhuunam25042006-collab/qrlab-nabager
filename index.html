<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Lab Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>📱 QR Lab Pro</header>

<div class="container">

<div class="card">

<input id="username" placeholder="Nhập tên người dùng">

<button class="scanBtn" onclick="startScan()">📷 Quét QR</button>
<div id="reader"></div>

<div id="result" class="resultBox">Chưa chọn thiết bị</div>

<button class="useBtn" onclick="startUse()">📅 Bắt đầu</button>
<button class="stopBtn" onclick="stopUse()">⏹ Kết thúc</button>
<button class="reportBtn" onclick="reportError()">⚠ Báo lỗi</button>

</div>

<div class="card">
<h3>📊 Trạng thái</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📜 Lịch sử</h3>
<div id="history"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
<script src="script.js"></script>

</body>
</html>
