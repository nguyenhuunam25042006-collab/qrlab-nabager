<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Lab Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:#eef2ff;
}

.header{
padding:20px;
text-align:center;
background:linear-gradient(135deg,#4a6cf7,#7b9cff);
color:white;
border-radius:0 0 30px 30px;
}

.container{
max-width:420px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:18px;
border-radius:20px;
margin-top:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#4a6cf7;color:white;}
.success{background:#2ecc71;color:white;}
.danger{background:#e74c3c;color:white;}

.result{
margin-top:10px;
padding:15px;
border-radius:15px;
background:#f7f9ff;
}

.device{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.badge{
padding:4px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -5px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="header">
<h2>🔬 QR Lab Manager</h2>
<p>Quản lý thiết bị phòng lab</p>
</div>

<div class="container">

<div class="card">
<button class="btn primary" onclick="scan()">📷 Quét QR</button>

<div id="reader"></div>
<div id="result"></div>

<button class="btn success" onclick="book()">📅 Sử dụng</button>
<button class="btn danger" onclick="report()">⚠️ Báo lỗi</button>
</div>

<div class="card">
<h3>📊 Trạng thái thiết bị</h3>
<div id="deviceList"></div>
</div>

<div class="card">
<h3>📈 Thống kê</h3>
<canvas id="chart"></canvas>
</div>

</div>

<div class="nav">
<div onclick="location.reload()">🏠</div>
<div onclick="scan()">📷</div>
<div onclick="window.scrollTo(0,document.body.scrollHeight)">📊</div>
</div>

<script src="script.js"></script>

</body>
</html>
