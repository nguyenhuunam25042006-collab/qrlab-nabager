<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Lab Pro - User</title>
    
    <style>
        /* 🎨 CSS GIAO DIỆN CHUẨN ĐIỆN THOẠI TRÊN LAPTOP */
        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: linear-gradient(135deg, #4a6cf7, #7b9cff);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center; /* Căn giữa Laptop */
            padding: 20px 0;
        }

        /* Khung chứa chính (Giới hạn độ rộng như Phone) */
        .main-container {
            width: 90%;
            max-width: 450px; /* Độ rộng chuẩn để Laptop nhìn đẹp */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 10px;
        }

        .header-section h1 { margin: 0; font-size: 28px; }
        .header-section p { margin: 5px 0; opacity: 0.8; font-size: 14px; }

        /* Thẻ trắng chứa nội dung */
        .card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: #333;
        }

        /* Vùng hiển thị Camera và Kết quả */
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #f0f0f0;
            margin-bottom: 15px;
        }

        #result {
            text-align: center;
            margin-bottom: 20px;
        }

        /* CSS Nút bấm giống ảnh bạn gửi */
        button {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        #btn-scan { background: #4a6cf7; }  /* Xanh dương */
        #btn-use { background: #2ecc71; }   /* Xanh lá */
        #btn-queue { background: #34495e; } /* Xanh đậm (Nút Hàng đợi) */
        #btn-checkin { background: #8e44ad; } /* Tím (Nút Check-in) */
        #btn-stop { background: #f39c12; }  /* Cam */
        #btn-error { background: #e74c3c; } /* Đỏ */
        #btn-log { background: #95a5a6; margin-top: 15px; } /* Xám (Nút Nhật ký) */

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #f8fafc;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }

        /* Biểu đồ Thống kê */
        .chart-container {
            height: 220px;
            margin-top: 10px;
        }

        /* Badge trạng thái */
        .badge {
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            display: inline-block;
            margin-top: 5px;
        }
        .free { background: #2ecc71; }
        .using { background: #f1c40f; color: black; }
        .broken { background: #e74c3c; }

        /* Bảng nhật ký */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <h1>🔬 QR Lab Pro</h1>
            <p>Quản lý thiết bị thí nghiệm</p>
        </div>

        <div class="card">
            <div id="reader"></div> 
            <div id="result">
                <p style="color: #999;">Quét mã trên máy để bắt đầu</p>
            </div>

            <button id="btn-scan" onclick="startScan()">📷 Quét QR</button>
            
            <input id="user-name" placeholder="Nhập tên người dùng...">
            
            <button id="btn-use" onclick="useDevice()">📅 Sử dụng ngay</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button id="btn-queue" onclick="joinQueue()" style="font-size: 14px;">📝 Đặt chỗ</button>
                <button id="btn-checkin" onclick="checkInFromQueue()" style="font-size: 14px;">✅ Check-in</button>
            </div>
            
            <button id="btn-stop" onclick="stopDevice()">⏹ Kết thúc</button>
            <button id="btn-error" onclick="errorDevice()">⚠️ Báo lỗi</button>
            
            <button id="btn-log" onclick="showLogbook()">📋 Xem Nhật ký Lab</button>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; display: flex; align-items: center; gap: 10px;">
                📊 Thống kê thiết bị
            </h3>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
