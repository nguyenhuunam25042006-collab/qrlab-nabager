<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Lab Pro</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:linear-gradient(135deg,#4a6cf7,#7b9cff);
color:white;
}

.header{
padding:25px;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
color:black;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
}

.scan{background:#4a6cf7;color:white;}
.use{background:#2ecc71;color:white;}
.stop{background:#f39c12;color:white;}
.error{background:#e74c3c;color:white;}

#reader{
width:100%;
margin-top:10px;
}

.result{
padding:15px;
margin-top:10px;
background:#f7f9ff;
border-radius:15px;
}

.badge{
padding:5px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
outline:none;
background:#f1f5f9;
}
</style>

</head>

<body>

<div class="header">
<h2>🔬 QR Lab Pro</h2>
<p>Quản lý thiết bị</p>
</div>

<div class="container">

<div class="card">

<button class="scan" onclick="startScan()">📷 Quét QR</button>

<div id="reader"></div>

<div id="result"></div>

<!-- 👤 nhập tên -->
<input id="username" placeholder="Nhập tên người dùng">

<button class="use" onclick="useDevice()">📅 Sử dụng</button>
<button class="stop" onclick="stopDevice()">⏹ Kết thúc</button>
<button class="error" onclick="errorDevice()">⚠️ Báo lỗi</button>

</div>
  <div class="card">
<h3>📋 Đang sử dụng</h3>
<div id="usingList"></div>
</div>

<div class="card">
<h3>📊 Thống kê</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
