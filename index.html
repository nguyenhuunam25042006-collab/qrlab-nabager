<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Lab Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#f3f5fb;
}

header{
background:linear-gradient(135deg,#5f7cff,#3a4bd9);
color:white;
text-align:center;
padding:30px;
border-radius:0 0 25px 25px;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.scan{background:#5f7cff;color:white;}
.form{background:#2ecc71;color:white;}
.report{background:#e74c3c;color:white;}

.device{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.badge{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:13px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;color:black;}
.broken{background:#e74c3c;}

.stats{
display:flex;
justify-content:space-between;
}

.box{
flex:1;
background:#f7f9ff;
margin:5px;
padding:10px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<header>
<h2>🔬 QR Lab Manager</h2>
<p>Quản lý thiết bị phòng Lab</p>
</header>

<div class="container">

<div class="card">

<button class="scan" onclick="scan()">📷 Quét QR</button>

<div id="reader"></div>

<p id="result">Chưa quét</p>

<button class="form" onclick="openForm()">📅 Đăng ký</button>

<button class="report" onclick="report()">⚠️ Báo hỏng</button>

</div>

<div class="card">

<h3>📊 Trạng thái</h3>

<div class="device"><span>TB001</span><span id="TB001"></span></div>
<div class="device"><span>TB002</span><span id="TB002"></span></div>
<div class="device"><span>TB003</span><span id="TB003"></span></div>

</div>

<div class="card">

<h3>📈 Thống kê</h3>

<div class="stats">
<div class="box"><h3 id="total">0</h3><p>Tổng</p></div>
<div class="box"><h3 id="using">0</h3><p>Đang dùng</p></div>
<div class="box"><h3 id="broken">0</h3><p>Hỏng</p></div>
</div>

</div>

</div>

<script>

const formLink="https://forms.gle/swQgBUYASe1Hinaw7";

const sheetURL="https://docs.google.com/spreadsheets/d/1ruY2FegopOUprLRQ3WV0UfLKFwLPvU-wOysibaBoWvI/gviz/tq?tqx=out:json";

let deviceNow="";

function scan(){

const qr=new Html5Qrcode("reader");

qr.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(text)=>{

// FIX QUAN TRỌNG
if(text.includes("http")){
text=text.split("/").pop();
}

deviceNow=text.trim().toUpperCase();

document.getElementById("result").innerHTML=
"Thiết bị: <b>"+deviceNow+"</b>";

qr.stop();

}

);

}

function openForm(){

if(deviceNow===""){
alert("Quét QR trước!");
return;
}

window.open(formLink,"_blank");

}

function report(){

if(deviceNow===""){
  alert("Quét QR trước!");
return;
}

window.open(formLink,"_blank");

}

async function load(){

const res=await fetch(sheetURL);
const txt=await res.text();

const json=JSON.parse(txt.substring(47).slice(0,-2));

const rows=json.table.rows;

let dev={
TB001:"Trống",
TB002:"Trống",
TB003:"Trống"
};

let total=0, using=0, broken=0;

rows.forEach(r=>{

const d=r.c[3]?.v;
const s=r.c[7]?.v;

if(d){

dev[d]=s;

total++;

if(s==="Đang sử dụng") using++;
if(s==="Bị hỏng") broken++;

}

});

update(dev);

document.getElementById("total").innerHTML=total;
document.getElementById("using").innerHTML=using;
document.getElementById("broken").innerHTML=broken;

}

function update(d){

set("TB001",d.TB001);
set("TB002",d.TB002);
set("TB003",d.TB003);

}

function set(id,s){

let el=document.getElementById(id);

if(s==="Đang sử dụng"){
el.innerHTML='<span class="badge using">🟡 Đang dùng</span>';
}
else if(s==="Bị hỏng"){
el.innerHTML='<span class="badge broken">🔴 Hỏng</span>';
}
else{
el.innerHTML='<span class="badge free">🟢 Trống</span>';
}

}

load();
setInterval(load,5000);

</script>

</body>
</html>
