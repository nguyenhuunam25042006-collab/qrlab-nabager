<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Lab Manager PRO MAX</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:-apple-system;
background:#f2f5ff;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#4a6cf7,#6a8dff);
color:white;
padding:20px;
text-align:center;
border-radius:0 0 25px 25px;
}

/* CARD */
.container{
padding:15px;
max-width:420px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-top:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.primary{background:#4a6cf7;color:white;}
.success{background:#2ecc71;color:white;}
.danger{background:#e74c3c;color:white;}

/* DEVICE */
.device{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.badge{
padding:5px 10px;
border-radius:10px;
color:white;
font-size:12px;
}

.free{background:#2ecc71;}
.using{background:#f1c40f;}
.broken{background:#e74c3c;}

/* NAVBAR APP */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.nav button{
border:none;
background:none;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<h2>🔬 QR Lab Manager</h2>
</div>

<div class="container">

<div class="card">
<input id="user" placeholder="Admin">
<input id="pass" type="password" placeholder="Password">
<button class="btn primary" onclick="login()">🔐 Đăng nhập</button>
</div>

<div class="card">
<button class="btn primary" onclick="scan()">📷 Quét QR</button>
<div id="reader"></div>
<div id="result"></div>

<button class="btn success" onclick="book()">📅 Đặt lịch</button>
<button class="btn danger" onclick="report()">⚠️ Báo hỏng</button>
</div>

<div class="card">
<h3>📊 Thiết bị</h3>
<div id="deviceList"></div>
</div>

<div class="card">
<h3>📈 Thống kê</h3>
<canvas id="chart"></canvas>
</div>

</div>

<div class="nav">
<button onclick="alert('Trang chủ')">🏠</button>
<button onclick="scan()">📷</button>
<button onclick="alert('Thống kê')">📊</button>
</div>

<script src="script.js"></script>

</body>
</html>
